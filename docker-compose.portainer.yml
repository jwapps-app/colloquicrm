# NAS stack (Portainer). Image-only; all env values are set in Portainer's UI.
# Bind-mount dirs to create once: /volume1/docker/colloquicrm/postgres, /volume1/docker/colloquicrm/backups, /volume1/docker/colloquicrm/attachments
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: app
    volumes:
      - /volume1/docker/colloquicrm/postgres:/var/lib/postgresql/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    image: ghcr.io/jwapps-app/colloquicrm:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3310}:8000"
    environment:
      ENVIRONMENT: production
      APP_NAME: ${APP_NAME:-Colloqui CRM}
      APP_URL: ${APP_URL}
      ALLOWED_ORIGINS: ${APP_URL}
      DATABASE_URL: postgresql+asyncpg://app:${POSTGRES_PASSWORD}@postgres:5432/app
      SECRET_KEY: ${SECRET_KEY}
      ATTACHMENTS_DIR: /data/attachments
    volumes:
      - /volume1/docker/colloquicrm/attachments:/data/attachments
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: app
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: app
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - /volume1/docker/colloquicrm/backups:/backups
    mem_limit: 128m
    entrypoint:
      - sh
      - -c
      - |
        while true; do
          if pg_dump -Fc -f "/backups/app-$$(date +%F).dump"; then
            find /backups -name '*.dump' -mtime +$${RETENTION_DAYS} -delete
            date > /backups/last-success
          else
            echo "BACKUP FAILED $$(date)" | tee -a /backups/failures.log
          fi
          sleep 86400
        done
    depends_on:
      postgres:
        condition: service_healthy
