# Local/dev stack: builds the image from source. NAS uses docker-compose.portainer.yml.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
      APP_URL: http://localhost:8010
      ALLOWED_ORIGINS: http://localhost:8010,http://localhost:5173
      ATTACHMENTS_DIR: /data/attachments
    volumes:
      - attachments:/data/attachments
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  attachments:
